<?xml version="1.0" encoding="UTF-8"?>
<!--
  Burst cluster icon — three offset photo frames with a flying bird as
  the front-frame subject. Bird: yellow wings + single green body
  circle with a white eye.
  spec/32 §7. ViewBox 200x200; outer 16px reserved for the host's
  status-border paint.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" fill="none">
  <!-- back frame -->
  <rect x="62" y="78" width="110" height="78" rx="5"
        fill="#E5E7EB" stroke="#6B7280" stroke-width="2.5"/>
  <!-- middle frame -->
  <rect x="48" y="64" width="110" height="78" rx="5"
        fill="#D1D5DB" stroke="#4B5563" stroke-width="2.5"/>
  <!-- front frame -->
  <rect x="34" y="50" width="110" height="78" rx="5"
        fill="#F9FAFB" stroke="#1F2937" stroke-width="3"/>

  <!-- Flying bird: yellow wings, single green body with eye. -->
  <!-- Wings (yellow) — drawn first; body sits over the junction. -->
  <path d="M 50,98 Q 70,68 89,86 Q 108,68 128,98"
        fill="none" stroke="#fbbf24" stroke-width="6"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Body — single circle. -->
  <circle cx="89" cy="86" r="8.5"
          fill="#15803d" stroke="#0f5132" stroke-width="1.5"/>
  <!-- Eyes — two white dots with dark pupils, symmetric on the body. -->
  <circle cx="92" cy="83.5" r="2.5" fill="#ffffff"/>
  <circle cx="92.5" cy="83.5" r="1.1" fill="#1F2937"/>
  <circle cx="86" cy="83.5" r="2.5" fill="#ffffff"/>
  <circle cx="85.5" cy="83.5" r="1.1" fill="#1F2937"/>
  <!-- Beak — small amber triangle pointing down, between the eyes. -->
  <path d="M 86.5,87.5 L 91.5,87.5 L 89,92.5 Z"
        fill="#f59e0b" stroke="#92400e" stroke-width="0.7"
        stroke-linejoin="round"/>
</svg>
