<?xml version="1.0" encoding="UTF-8"?>
<!--
  Exposure cluster icon — three offset photo frames with a brightness
  gradient (dark/normal/bright) suggesting EV bracketing, plus -/+ ticks.
  spec/32 §7. ViewBox 200x200; outer 16px reserved for host status border.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" fill="none">
  <!-- back frame: darker (under-exposed) -->
  <rect x="62" y="78" width="110" height="78" rx="5"
        fill="#374151" stroke="#1F2937" stroke-width="2.5"/>
  <!-- middle frame: neutral mid-grey -->
  <rect x="48" y="64" width="110" height="78" rx="5"
        fill="#9CA3AF" stroke="#4B5563" stroke-width="2.5"/>
  <!-- front frame: brighter (over-exposed) -->
  <rect x="34" y="50" width="110" height="78" rx="5"
        fill="#F9FAFB" stroke="#1F2937" stroke-width="3"/>

  <!-- small sun-like icon inside front frame -->
  <circle cx="89" cy="89" r="11" fill="#FBBF24" stroke="#1F2937" stroke-width="2"/>
  <!-- sun rays -->
  <g stroke="#1F2937" stroke-width="2" stroke-linecap="round">
    <line x1="89" y1="68" x2="89" y2="73"/>
    <line x1="89" y1="105" x2="89" y2="110"/>
    <line x1="68" y1="89" x2="73" y2="89"/>
    <line x1="105" y1="89" x2="110" y2="89"/>
    <line x1="74" y1="74" x2="77" y2="77"/>
    <line x1="101" y1="101" x2="104" y2="104"/>
    <line x1="74" y1="104" x2="77" y2="101"/>
    <line x1="101" y1="77" x2="104" y2="74"/>
  </g>

  <!-- EV bracket ticks: minus on top-right, plus on bottom-right -->
  <g font-family="sans-serif" font-weight="700" font-size="22" fill="#1F2937">
    <text x="156" y="38" text-anchor="middle">−</text>
    <text x="156" y="178" text-anchor="middle">+</text>
  </g>
</svg>
