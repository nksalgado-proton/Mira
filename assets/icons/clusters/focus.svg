<?xml version="1.0" encoding="UTF-8"?>
<!--
  Focus cluster icon — three offset photo frames + concentric focus rings
  on the front frame, indicating shifting depth-of-field across the stack.
  spec/32 §7. ViewBox 200x200; outer 16px reserved for host status border.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" fill="none">
  <!-- back frame -->
  <rect x="58" y="74" width="110" height="78" rx="5"
        fill="#E5E7EB" stroke="#6B7280" stroke-width="2.5"/>
  <!-- middle frame -->
  <rect x="44" y="60" width="110" height="78" rx="5"
        fill="#D1D5DB" stroke="#4B5563" stroke-width="2.5"/>
  <!-- front frame -->
  <rect x="30" y="46" width="110" height="78" rx="5"
        fill="#F9FAFB" stroke="#1F2937" stroke-width="3"/>

  <!-- concentric focus rings in the front frame (depth of focus) -->
  <circle cx="85" cy="85" r="26" fill="none" stroke="#1F2937" stroke-width="2.5" opacity="0.45"/>
  <circle cx="85" cy="85" r="18" fill="none" stroke="#1F2937" stroke-width="2.5" opacity="0.7"/>
  <circle cx="85" cy="85" r="10" fill="none" stroke="#1F2937" stroke-width="2.5"/>
  <!-- central focus dot -->
  <circle cx="85" cy="85" r="3" fill="#1F2937"/>

  <!-- crosshair tick marks -->
  <line x1="85" y1="55" x2="85" y2="60" stroke="#1F2937" stroke-width="2" stroke-linecap="round"/>
  <line x1="85" y1="110" x2="85" y2="115" stroke="#1F2937" stroke-width="2" stroke-linecap="round"/>
  <line x1="55" y1="85" x2="60" y2="85" stroke="#1F2937" stroke-width="2" stroke-linecap="round"/>
  <line x1="110" y1="85" x2="115" y2="85" stroke="#1F2937" stroke-width="2" stroke-linecap="round"/>
</svg>
