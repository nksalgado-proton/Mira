<?xml version="1.0" encoding="UTF-8"?>
<!--
  Repeat cluster icon — universal "duplicate" metaphor with a landscape
  photo as the front frame's content. Two offset frames; the front frame
  holds a tiny scenic photo (sky, sun, two mountains with a snow cap);
  the top-right corner of the front frame is folded over, revealing the
  page underneath. Reads as "I took this scenic photo, and I took
  another one just like it."
  Spec/52 §Quick Sweep, slice A.
  ViewBox 200x200; outer 16px reserved for the host's status-border paint.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" fill="none">
  <defs>
    <!-- Clip path matching the front frame's notched outline. The
         scenery is drawn freely; this clip keeps it inside the page. -->
    <clipPath id="repeatFrontClip">
      <path d="M 40,51 L 121,51 L 145,75 L 145,124
               Q 145,129 140,129 L 40,129
               Q 35,129 35,124 L 35,56
               Q 35,51 40,51 Z"/>
    </clipPath>
  </defs>

  <!-- back frame -->
  <rect x="55" y="71" width="110" height="78" rx="5"
        fill="#D1D5DB" stroke="#4B5563" stroke-width="2.5"/>

  <!-- Front frame: white background (notched). Stroke added below so
       it draws on top of the scenery. -->
  <path d="M 40,51 L 121,51 L 145,75 L 145,124
           Q 145,129 140,129 L 40,129
           Q 35,129 35,124 L 35,56
           Q 35,51 40,51 Z"
        fill="#F9FAFB"/>

  <!-- Scenery inside the front frame, clipped to its notched shape -->
  <g clip-path="url(#repeatFrontClip)">
    <!-- Sky -->
    <rect x="35" y="51" width="115" height="78" fill="#93C5FD"/>

    <!-- Sun (warm amber, matches exposure.svg's sun palette) -->
    <circle cx="68" cy="82" r="8" fill="#FBBF24"/>

    <!-- Back mountain (tall, teal — distant peak) -->
    <path d="M 32,129 L 80,68 L 128,129 Z" fill="#0F766E"/>
    <!-- Snow cap on the back mountain -->
    <path d="M 73,79 L 80,68 L 87,79 L 83,80 L 80,77 L 76,80 Z"
          fill="#F9FAFB"/>

    <!-- Front mountain (shorter, green — closer peak) -->
    <path d="M 55,129 L 108,90 L 148,129 Z" fill="#16A34A"/>
  </g>

  <!-- Front frame stroke (on top of scenery so the page outline reads) -->
  <path d="M 40,51 L 121,51 L 145,75 L 145,124
           Q 145,129 140,129 L 40,129
           Q 35,129 35,124 L 35,56
           Q 35,51 40,51 Z"
        fill="none" stroke="#1F2937" stroke-width="3"
        stroke-linejoin="round"/>

  <!-- Fold flap on top: the curled-over page corner. Drawn last so it
       overlays any scenery in that area. -->
  <path d="M 121,51 L 145,75 L 121,75 Z"
        fill="#D1D5DB" stroke="#1F2937" stroke-width="2"
        stroke-linejoin="round"/>
</svg>
